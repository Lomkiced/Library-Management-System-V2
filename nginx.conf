# =============================================================================
# Library Management System - Nginx Configuration
# =============================================================================
# Production-ready reverse proxy for Laravel API + React SPA
# Optimized for LAN deployment via Docker
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---------------------------------------------------------------------
    # Logging Configuration
    # ---------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ---------------------------------------------------------------------
    # Performance Optimizations
    # ---------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy
        text/javascript;

    # ---------------------------------------------------------------------
    # Security Headers
    # ---------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------------------------------------------------------------------
    # Rate Limiting
    # ---------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ---------------------------------------------------------------------
    # Upstream Configuration (PHP-FPM)
    # ---------------------------------------------------------------------
    upstream php-fpm {
        server app:9000;
        keepalive 32;
    }

    # ---------------------------------------------------------------------
    # HTTP Server
    # ---------------------------------------------------------------------
    # ---------------------------------------------------------------------
    # HTTP Server (Redirect to HTTPS)
    # ---------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        
        # Determine if the request came from internal docker network or external
        # We redirect external requests to HTTPS
        return 301 https://$host$request_uri;
    }

    # ---------------------------------------------------------------------
    # HTTPS Server
    # ---------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name _;

        # SSL Configuration
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        
        root /var/www/html/public;
        index index.php index.html;

        # Client body size for file uploads
        client_max_body_size 200M;

        # Preserve the original port in redirects (Docker maps external 8080 → internal 80)
        absolute_redirect off;

        # Connection limits
        limit_conn conn_limit 20;

        # -----------------------------------------------------------------
        # Health Check Endpoint
        # -----------------------------------------------------------------
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # -----------------------------------------------------------------
        # SPA Static Assets at Root Paths
        # React references logos/images at root (e.g. /pclu-logo.png)
        # but in Docker they live under /app/. Rewrite to correct path.
        # -----------------------------------------------------------------
        location ~ ^/(pclu-logo\.png|iso-logo\.png|librarian-avatar\.png|vite\.svg|shush\.mp3)$ {
            root /var/www/html/public/app;
            try_files /$1 =404;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # -----------------------------------------------------------------
        # API Routes (Laravel Backend)
        # -----------------------------------------------------------------
        location /api {
            limit_req zone=api_limit burst=50 nodelay;
            
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Rate limit for authentication endpoints (including OTP/Forgot Password)
        location ~ ^/api/(login|register|password|forgot-password) {
            limit_req zone=login_limit burst=3 nodelay;
            
            try_files $uri $uri/ /index.php?$query_string;
        }

        # -----------------------------------------------------------------
        # Sanctum CSRF Cookie
        # -----------------------------------------------------------------
        location /sanctum/csrf-cookie {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # -----------------------------------------------------------------
        # Laravel Storage (Public Files)
        # -----------------------------------------------------------------
        location ^~ /storage {
            alias /var/www/html/storage/app/public;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # -----------------------------------------------------------------
        # PHP-FPM Processing
        # -----------------------------------------------------------------
        location ~ \.php$ {
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_connect_timeout 300;
            fastcgi_send_timeout 300;
            fastcgi_read_timeout 300;
            
            # Hide PHP version
            fastcgi_hide_header X-Powered-By;
        }

        # -----------------------------------------------------------------
        # Public Kiosk Routes (served by React SPA)
        # These are direct URLs that LAN users/kiosks can bookmark.
        # Nginx internally rewrites them to the SPA entry point.
        # -----------------------------------------------------------------
        location = /catalog {
            rewrite ^ /app/index.html break;
        }
        location = /attendance {
            rewrite ^ /app/index.html break;
        }
        location = /print/card {
            rewrite ^ /app/index.html break;
        }

        # -----------------------------------------------------------------
        # React SPA Assets (Built Frontend at /app/)
        # Uses alias with named location fallback to avoid redirect cycles.
        # -----------------------------------------------------------------
        location /app {
            alias /var/www/html/public/app;
            index index.html;
            try_files $uri $uri/ @spa_fallback;
            
            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp3)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # Named location: serves SPA index.html for client-side routing
        location @spa_fallback {
            root /var/www/html/public;
            try_files /app/index.html =404;
        }

        # -----------------------------------------------------------------
        # Static Assets at Root
        # -----------------------------------------------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # -----------------------------------------------------------------
        # Default: Redirect root to SPA
        # -----------------------------------------------------------------
        location = / {
            return 302 $scheme://$http_host/app/;
        }

        location / {
            # Try as Laravel route first, then fallback to SPA
            try_files $uri $uri/ /app/index.html;
        }

        # -----------------------------------------------------------------
        # Deny access to sensitive files
        # -----------------------------------------------------------------
        location ~ /\.(?!well-known) {
            deny all;
        }

        location ~ /\.env {
            deny all;
        }

        location ~ /\.git {
            deny all;
        }

        # -----------------------------------------------------------------
        # Error Pages
        # -----------------------------------------------------------------
        error_page 404 /app/index.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

}
